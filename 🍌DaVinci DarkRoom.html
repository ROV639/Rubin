<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🫟 DaVinci DarkRoom</title>
  <style>
    :root {
      --bg: #0b0b10;
      --surface: #14141c;
      --surface2: #1c1c28;
      --border: #2a2a3a;
      --accent: #a855f7;
      --accent2: #7c3aed;
      --text: #f0f0f0;
      --text2: #888;
      --danger: #ef4444;
      --success: #22c55e;
      --image-color: #a855f7;
      --music-color: #f97316;
      --tts-color: #06b6d4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }
    .topbar-logo { font-size: 16px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .topbar-logo span { color: var(--text); }
    .mode-tabs { display: flex; gap: 4px; margin-left: 16px; }
    .mode-tab {
      padding: 5px 14px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .mode-tab:hover { background: var(--surface2); color: var(--text); }
    .mode-tab.active { background: var(--accent); color: #000; font-weight: 600; }
    .mode-tab[data-mode="image"].active { background: var(--image-color); }
    .mode-tab[data-mode="music"].active { background: var(--music-color); color: #fff; }
    .mode-tab[data-mode="tts"].active { background: var(--tts-color); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .credits { display: flex; gap: 8px; }
    .credit { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; display: flex; align-items: center; gap: 4px; }
    .credit span { font-weight: 600; }
    .credit.img span { color: var(--image-color); }
    .credit.music span { color: var(--music-color); }
    .credit.tts span { color: var(--tts-color); }
    .credit.lz span { color: var(--accent); }
    .refresh-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; padding: 4px; border-radius: 6px; }
    .refresh-btn:hover { color: var(--accent); }

    /* ===== MAIN ===== */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== LEFT PANEL ===== */
    .panel-left {
      width: 50%;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-inner {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Section label */
    .section { display: flex; flex-direction: column; gap: 6px; }
    .section-label {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Input */
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      font-size: 13px;
      resize: none;
      min-height: 72px;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text2); }

    /* Pills */
    .pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }
    .pill.sub { font-size: 10px; padding: 3px 8px; }

    /* Select */
    select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      width: 100%;
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .toggle-label { font-size: 13px; color: var(--text2); }
    .toggle {
      width: 40px; height: 22px;
      background: var(--border);
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(18px); }

    /* Upload */
    .upload-row { display: flex; gap: 8px; align-items: center; }
    .upload-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .upload-btn:hover { border-color: var(--accent); color: var(--text); }
    .upload-btn.active { border-color: var(--accent); color: var(--accent); }
    .file-name { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }

    /* Generate btn */
    .gen-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.02em;
    }
    .gen-btn:hover { opacity: 0.85; }
    .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status bar */
    .status-bar {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text2);
      background: var(--surface);
      border-top: 1px solid var(--border);
      min-height: 38px;
      flex-shrink: 0;
    }
    .status-bar.success { color: var(--success); }
    .status-bar.error { color: var(--danger); }

    /* ===== RIGHT PANEL - GALLERY ===== */
    .panel-right {
      width: 50%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .gallery-title { font-size: 13px; color: var(--text2); font-weight: 500; }
    .gallery-count { font-size: 11px; color: var(--text2); margin-left: 6px; }
    .gallery-actions { display: flex; gap: 6px; }
    .action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      color: var(--text2);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

    .gallery-scroll { flex: 1; overflow-y: auto; padding: 12px; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .gallery-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }
    .gallery-item:hover { transform: translateY(-2px); border-color: var(--accent); }
    .gallery-item .thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }
    .gallery-item .thumb.audio-thumb {
      aspect-ratio: auto;
      height: 80px;
    }
    .gallery-item .item-info { padding: 8px 10px; }
    .gallery-item .item-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .gallery-item .model-tag {
      font-size: 10px;
      background: var(--accent);
      color: #000;
      padding: 2px 7px;
      border-radius: 8px;
      font-weight: 600;
    }
    .gallery-item .cost-tag { font-size: 10px; color: var(--text2); }
    .gallery-item .prompt-pre {
      font-size: 11px;
      color: var(--text2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .gallery-item audio {
      width: 100%;
      height: 28px;
      margin-top: 6px;
      border-radius: 14px;
    }

    /* Empty */
    .empty-gallery {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .empty-gallery .icon { font-size: 42px; opacity: 0.25; }
    .empty-gallery p { font-size: 13px; margin-top: 10px; }
    .empty-gallery .hint { font-size: 11px; opacity: 0.5; margin-top: 4px; }

    /* ===== MODAL ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    .modal.active { display: flex; }
    .modal-img {
      max-width: 80vw;
      max-height: 65vh;
      border-radius: 14px;
      object-fit: contain;
    }
    .modal-meta {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-top: 14px;
      padding: 14px 18px;
    }
    .modal-meta-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .modal-meta-header .model-badge {
      font-size: 10px;
      background: var(--accent);
      color: #000;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 600;
    }
    .modal-meta-header .time { font-size: 11px; color: var(--text2); }
    .modal-prompt-label {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .modal-prompt-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
    .modal-btn {
      flex: 1;
      padding: 9px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .modal-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .modal-close {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--text);
    }

    /* Spinner */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(168,85,247,0.05); }
    .drop-zone.has-img { padding: 8px; border-style: solid; border-color: var(--accent); }
    .drop-zone-img { max-height: 120px; max-width: 100%; border-radius: 8px; display: block; margin: 0 auto; }
    .drop-zone-label { font-size: 12px; color: var(--text2); pointer-events: none; }
    .drop-zone-label span { color: var(--accent); font-weight: 600; }
    .drop-zone .clear-ref {
      position: absolute; top: 6px; right: 6px;
      background: var(--danger); color: #fff; border: none;
      border-radius: 50%; width: 20px; height: 20px;
      font-size: 11px; cursor: pointer; line-height: 20px; text-align: center;
      display: none;
    }
    .drop-zone.has-img .clear-ref { display: block; }

    /* Pill enhancements */
    .pill.active { box-shadow: inset 3px 0 0 var(--accent); }
    .pill-label { font-size: 11px; color: var(--text2); }

    /* Generation progress */
    .gen-progress {
      display: none;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin: 4px 0;
    }
    .gen-progress.active { display: block; }
    .gen-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }
    .gen-progress-bar.indeterminate { animation: indeterminate 1.2s ease-in-out infinite; }
    @keyframes indeterminate { 0%{width:0%} 50%{width:60%} 100%{width:100%} }
    .mode-content { display: none; }
    .mode-content.active { display: flex; flex-direction: column; gap: 10px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .main { flex-direction: column; }
      .panel-left, .panel-right { width: 100%; }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); max-height: 60vh; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">🫟 <span>DaVinci DarkRoom</span></div>
  <a href="https://rubin.ccwu.cc" target="_blank" class="mode-tab" style="margin-left:8px;font-size:12px;color:var(--text2);text-decoration:none;padding:5px 10px;border-radius:8px;border:none;background:transparent;cursor:pointer;">← 泽川</a>
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="image" onclick="switchMode('image')">🖼️ 图片</button>
    <button class="mode-tab" data-mode="music" onclick="switchMode('music')">🎵 音乐</button>
    <button class="mode-tab" data-mode="tts" onclick="switchMode('tts')">🔊 语音</button>
  </div>
  <div class="topbar-right">
    <div class="credits">
      <div class="credit img">🖼️ <span id="img-credit">—</span>/日</div>
      <div class="credit music">🎵 <span id="music-credit">—</span></div>
      <div class="credit tts">🔊 <span id="tts-credit">—</span></div>
      <div class="credit lz">🍌 <span>$</span></div>
    </div>
    <button class="refresh-btn" onclick="refreshCredits();refreshLaozhangBalance()" title="刷新额度">↻</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: Controls -->
  <div class="panel-left">
    <div class="panel-inner">

      <!-- ===== IMAGE MODE ===== -->
      <div class="mode-content active" id="mode-image">

        <!-- Drop zone (top) -->
        <div class="drop-zone" id="img-drop" onclick="document.getElementById('img-ref').click()">
          <button class="clear-ref" id="img-drop-clear" onclick="clearRefImg(event)">✕</button>
          <div id="img-drop-content">
            <div class="drop-zone-label">📎 <span>拖入参考图</span> 或点击选择</div>
            <div style="font-size:11px;color:var(--text2);margin-top:4px;">支持 JPG/PNG，关闭可提升风格自由度</div>
          </div>
        </div>
        <input type="file" id="img-ref" accept="image/*">

        <div class="section" style="margin-top:2px;">
          <div class="section-label">提示词</div>
          <textarea id="img-prompt" placeholder="描述你想要的图片..."></textarea>
        </div>

        <div class="section">
          <div class="section-label">模型</div>
          <div style="display:flex;gap:6px;">
            <button class="pill model-btn active" data-m="image-01" onclick="selectModel(this,'image-01')">📷 image-01</button>
            <button class="pill model-btn" data-m="image-01-live" onclick="selectModel(this,'image-01-live')">🎬 image-live</button>
            <button class="pill model-btn" data-m="laozhang-gpt-image-2" onclick="selectModel(this,'laozhang-gpt-image-2')">🍌 $0.03</button>
          </div>
        </div>

        <div class="section">
          <div class="section-label">尺寸比例</div>
          <div class="pill-group" id="img-ratio">
            <button class="pill" data-v="1:1">1:1</button>
            <button class="pill" data-v="16:9">16:9</button>
            <button class="pill active" data-v="3:4">3:4</button>
            <button class="pill" data-v="4:3">4:3</button>
            <button class="pill" data-v="2:3">2:3</button>
            <button class="pill" data-v="9:16">9:16</button>
            <button class="pill" data-v="3:2">3:2</button>
            <button class="pill" data-v="21:9">21:9</button>
          </div>
        </div>

        <div class="section">
          <div class="section-label">画面风格</div>
          <div class="pill-group" id="img-style">
            <button class="pill" data-en="photographic">📷 摄影</button>
            <button class="pill" data-en="anime">🎌 动漫</button>
            <button class="pill" data-en="oil painting">🖼️ 油画</button>
            <button class="pill" data-en="watercolor">🎨 水彩</button>
            <button class="pill" data-en="cyberpunk">🤖 赛博</button>
            <button class="pill" data-en="ghibli style">🏯 吉卜力</button>
            <button class="pill" data-en="impressionist">印象</button>
            <button class="pill" data-en="digital art">💻 数字</button>
            <button class="pill" data-en="cinematic lighting">🎬 电影感</button>
          </div>
        </div>

        <div class="section">
          <div class="toggle-row">
            <span class="toggle-label">✨ 提示词优化</span>
            <div class="toggle" id="img-optimizer" onclick="this.classList.toggle('on')"></div>
          </div>
        </div>

      </div>

      <!-- ===== MUSIC MODE ===== -->
      <div class="mode-content" id="mode-music">

        <div class="section">
          <div class="section-label">音乐描述</div>
          <textarea id="music-prompt" placeholder="描述音乐风格：独立民谣、忧郁、内省、渴望、咖啡馆漫步..."></textarea>
        </div>

        <div class="section">
          <div class="section-label">音乐类型</div>
          <div class="pill-group" id="music-genre">
            <button class="pill" data-en="electronic" data-v="电子">🎧 电子</button>
            <button class="pill" data-en="lo-fi" data-v="Lo-fi">🎹 Lo-fi</button>
            <button class="pill" data-en="pop" data-v="流行">🎤 流行</button>
            <button class="pill" data-en="classical" data-v="古典">🎻 古典</button>
            <button class="pill" data-en="ambient" data-v="环境">🌿 环境</button>
            <button class="pill" data-en="cinematic" data-v="电影感">🎬 电影感</button>
            <button class="pill" data-en="cyberpunk" data-v="赛博">🤖 赛博</button>
            <button class="pill" data-en="chinese-style" data-v="中国风">🏮 中国风</button>
            <button class="pill" data-en="k-pop" data-v="K-Pop">🇰🇷 K-Pop</button>
            <button class="pill" data-en="j-pop" data-v="J-Pop">🎷 J-Pop</button>
            <button class="pill" data-en="r&b" data-v="R&B">🎶 R&B</button>
            <button class="pill" data-en="rock" data-v="摇滚">🎸 摇滚</button>
            <button class="pill" data-en="jazz" data-v="爵士">🎺 爵士</button>
            <button class="pill" data-en="folk" data-v="民谣">🪕 民谣</button>
            <button class="pill" data-en="hip-hop" data-v="嘻哈">🎤 嘻哈</button>
          </div>
        </div>

        <div class="section">
          <div class="section-label">情绪基调</div>
          <div class="pill-group" id="music-mood">
            <button class="pill" data-en="energetic" data-v="激昂">⚡ 激昂</button>
            <button class="pill" data-en="intense" data-v="躁动">🔥 躁动</button>

<script>
const API = 'http://localhost:18793';

// ============ STATE ============
let currentMode = 'image';
let history = [];
let currentItem = null;
let ttsFmt = 'wav';

// ============ INIT ============
init();

async function init() {
  await loadHistory();
  refreshCredits();
}

// ============ API HELPERS ============
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'API error');
  return json;
}

// ============ CREDITS ============
async function refreshCredits() {
  try {
    const d = await api('/credits/all');
    if (d.minimax?.image) {
      document.getElementById('img-credit').textContent = d.minimax.image.remaining ?? d.minimax.image.remaining;
    }
    if (d.minimax?.tts) {
      document.getElementById('tts-credit').textContent = d.minimax.tts.remaining;
    }
    if (d.minimax?.music) {
      document.getElementById('music-credit').textContent = Object.values(d.minimax.music)[0]?.remaining || '-';
    }
    if (d.laozhang?.balance !== undefined) {
      document.querySelector('.credit.lz span').textContent = '$' + d.laozhang.balance.toFixed(2);
    }
  } catch (e) {
    // silent fail - credits are nice to have
  }
}

async function refreshLaozhangBalance() {
  try {
    const d = await api('/credits/laozhang');
    if (d.balance !== undefined) {
      document.querySelector('.credit.lz span').textContent = '$' + d.balance.toFixed(2);
    }
  } catch(e) {}
}

// ============ HISTORY ============
async function loadHistory() {
  try {
    const d = await api('/history?limit=50');
    history = d.items || [];
  } catch (e) {
    history = [];
  }
  renderGallery();
}

async function clearHistoryAPI() {
  await api('/history/clear', { method: 'POST' });
  history = [];
  renderGallery();
  setStatus('已清空', 'success');
}

// ============ MODEL SELECTOR ============
let currentImageModel = 'image-01';

function selectModel(el, model) {
  document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentImageModel = model;
}

// ============ DRAG-DROP REF IMAGE ============
const dropZone = document.getElementById('img-drop');
const fileInput = document.getElementById('img-ref');

dropZone?.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone?.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone?.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
    showRefPreview(file);
  }
});

fileInput?.addEventListener('change', e => {
  if (e.target.files[0]) showRefPreview(e.target.files[0]);
});

function showRefPreview(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const content = document.getElementById('img-drop-content');
    content.innerHTML = `<img class="drop-zone-img" src="${e.target.result}" alt="ref">`;
    dropZone.classList.add('has-img');
  };
  reader.readAsDataURL(file);
}

function clearRefImg(e) {
  e.stopPropagation();
  fileInput.value = '';
  const content = document.getElementById('img-drop-content');
  content.innerHTML = `<div class="drop-zone-label">📎 <span>拖入参考图</span> 或点击选择</div><div style="font-size:11px;color:var(--text2);margin-top:4px;">支持 JPG/PNG，关闭可提升风格自由度</div>`;
  dropZone.classList.remove('has-img');
}

// ============ MODE SWITCH ============
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.querySelectorAll('.mode-content').forEach(c => c.classList.toggle('active', c.id === 'mode-' + mode));
}

// ============ PILL SELECTION ============
document.querySelectorAll('.pill-group').forEach(group => {
  group.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      const siblings = group.querySelectorAll('.pill');
      siblings.forEach(s => {
        if (!s.classList.contains('sub') && !s.id?.startsWith('fmt')) s.classList.remove('active');
      });
      p.classList.add('active');
    });
  });
});

function setFmt(el, fmt) {
  document.getElementById('fmt-mp3').classList.remove('active');
  document.getElementById('fmt-wav').classList.remove('active');
  el.classList.add('active');
  ttsFmt = fmt;
}

['img-ref'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', e => {
    const f = e.target.files[0];
    const n = document.getElementById(id + '-name');
    if (f) { n.textContent = f.name; n.style.display = 'inline'; }
  });
});

// ============ GENERATE ============
async function generate() {
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 生成中';
  setStatus('生成中...', '');

  // progress bar
  const progress = document.getElementById('genProgress');
  const bar = document.getElementById('genProgressBar');
  progress.classList.add('active');
  bar.classList.add('indeterminate');
  bar.style.width = '30%';

  try {
    let result;
    if (currentMode === 'image') result = await genImageAPI();
    else if (currentMode === 'music') result = await genMusicAPI();
    else if (currentMode === 'tts') result = await genTTSAPI();

    bar.style.width = '100%';
    setTimeout(() => bar.classList.remove('active'), 300);

    await loadHistory();
    await refreshCredits();

    setStatus(currentMode === 'tts' ? '✓ 音频生成成功' : `✓ 生成成功（${result.model}）`, 'success');
  } catch(e) {
    bar.classList.remove('active');
    setStatus('✗ ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '✨ 生成';
}

function getPillValue(groupId) {
  const active = document.querySelector('#' + groupId + ' .pill.active');
  return active ? (active.dataset.v || active.dataset.en || '') : '';
}

function getPillEn(groupId) {
  const active = document.querySelector('#' + groupId + ' .pill.active');
  return active ? (active.dataset.en || active.dataset.v || '') : '';
}

// ============ IMAGE API ============
async function genImageAPI() {
  const prompt = document.getElementById('img-prompt').value.trim();
  if (!prompt) throw new Error('请输入提示词');

  const model = currentImageModel;
  const ratio = getPillValue('img-ratio') || '3:4';
  const style = getPillEn('img-style');
  const optimizer = document.getElementById('img-optimizer')?.classList.contains('on');
  const refFile = fileInput.files[0];

  const body = { model, prompt, ratio, style, optimizer, watermark };

  if (refFile) {
    const reader = new FileReader();
    const b64 = await new Promise(resolve => {
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(refFile);
    });
    body.image_file = b64;
  }

  return await api('/generate/image', { method: 'POST', body: JSON.stringify(body) });
}

// ============ MUSIC API ============
async function genMusicAPI() {
  const prompt = document.getElementById('music-prompt').value.trim();
  const lyrics = document.getElementById('music-lyrics').value.trim();
  const durationVal = getPillValue('music-duration');
  const instrumental = document.getElementById('toggle-instrumental')?.classList.contains('on');
  const model = document.getElementById('music-model')?.value || 'music-2.6';

  const body = {
    prompt,
    genre: getPillEn('music-genre'),
    mood: getPillEn('music-mood'),
    tempo: getPillEn('music-tempo'),
    instrument: getPillEn('music-instrument'),
    vocal: getPillEn('music-vocal'),
    duration: durationVal ? parseInt(durationVal) : 60,
    lyrics,
    instrumental,
    model
  };

  return await api('/generate/music', { method: 'POST', body: JSON.stringify(body) });
}

// ============ TTS API ============
async function genTTSAPI() {
  const text = document.getElementById('tts-text').value.trim();
  if (!text) throw new Error('请输入文本');

  const voice_id = document.getElementById('tts-voice')?.value || 'male-qn-qingse';
  const emotion = getPillValue('tts-emotion') || 'auto';
  const speed = parseFloat(getPillValue('tts-speed')) || 1.0;

  const body = { text, voice_id, emotion, speed, format: ttsFmt };
  return await api('/generate/tts', { method: 'POST', body: JSON.stringify(body) });
}

// ============ GALLERY ============
function renderGallery() {
  const grid = document.getElementById('gallery');
  const count = document.getElementById('galleryCount');
  count.textContent = history.length > 0 ? `共 ${history.length} 条` : '';

  if (history.length === 0) {
    grid.innerHTML = '<div class="empty-gallery"><div class="icon">🍌</div><p>还没有创作记录</p><div class="hint">选择一个模式，开始创作吧</div></div>';
    return;
  }

  grid.innerHTML = history.map(item => {
    const tag = item.model?.split('-')[0] || item.model || item.provider || 'IMG';
    const costLabel = item.cost > 0 ? '$' + item.cost.toFixed(2) : '免费';
    const promptPre = item.prompt?.substring(0, 60) || '';

    if (item.type === 'image') {
      return `<div class="gallery-item" onclick="openModal('${item.id}')">
        <img class="thumb" src="${item.url}" alt="" loading="lazy">
        <div class="item-info">
          <div class="item-meta">
            <span class="model-tag">${tag}</span>
            <span class="cost-tag">${costLabel}</span>
          </div>
          <div class="prompt-pre">${promptPre}</div>
        </div>
      </div>`;
    } else {
      const icon = item.type === 'music' ? '🎵' : '🔊';
      return `<div class="gallery-item" onclick="openModal('${item.id}')">
        <img class="thumb audio-thumb" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 80'%3E%3Crect fill='%231c1c28' width='200' height='80'/%3E%3Ctext x='100' y='45' text-anchor='middle' fill='%23a855f7' font-size='22'%3E${icon}%3C/text%3E%3Ctext x='100' y='62' text-anchor='middle' fill='%23888' font-size='10'%3E${encodeURIComponent(tag)}%3C/text%3E%3C/svg%3E" alt="">
        <div class="item-info">
          <div class="item-meta">
            <span class="model-tag">${tag}</span>
            <span class="cost-tag">${costLabel}</span>
          </div>
          <div class="prompt-pre">${promptPre}</div>
          ${item.audio_hex ? `<audio controls src="data:audio/${item.format || 'wav'};base64,${item.audio_hex}" onclick="event.stopPropagation()"></audio>` : (item.url ? `<audio controls src="${item.url}" onclick="event.stopPropagation()"></audio>` : '')}
        </div>
      </div>`;
    }
  }).join('');
}

// ============ MODAL ============
function openModal(id) {
  const item = history.find(h => h.id == id || h.id === id);
  if (!item) return;
  currentItem = item;

  const modal = document.getElementById('modal');
  const img = document.getElementById('modalImg');
  img.src = item.url || '';
  img.style.display = item.type === 'image' ? 'block' : 'none';
  document.getElementById('modalBadge').textContent = item.model || item.provider || '—';
  document.getElementById('modalTime').textContent = item.time || '—';
  document.getElementById('modalPrompt').textContent = item.prompt || '—';
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  currentItem = null;
}

function modalDownload() {
  if (!currentItem) return;
  if (currentItem.audio_hex) {
    const binary = hexStrToArrayBuffer(currentItem.audio_hex);
    const blob = new Blob([binary], { type: 'audio/' + (currentItem.format || 'wav') });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'davinci-' + currentItem.id + '.' + (currentItem.format || 'wav');
    a.click();
  } else if (currentItem.url) {
    const a = document.createElement('a');
    a.href = currentItem.url;
    a.download = 'davinci-' + currentItem.id + (currentItem.type === 'audio' ? '.mp3' : '.png');
    a.target = '_blank';
    a.click();
  }
}

function copyPrompt() {
  if (!currentItem) return;
  navigator.clipboard.writeText(currentItem.prompt).then(() => setStatus('已复制', 'success'));
}

function reusePrompt() {
  if (!currentItem) return;
  if (currentItem.type === 'image') {
    switchMode('image');
    document.getElementById('img-prompt').value = currentItem.prompt || '';
  } else if (currentItem.type === 'music') {
    switchMode('music');
    document.getElementById('music-prompt').value = currentItem.prompt || '';
  } else if (currentItem.type === 'audio') {
    switchMode('tts');
    document.getElementById('tts-text').value = currentItem.prompt || '';
  }
  closeModal();
}

function clearHistory() {
  if (!confirm('确定清空全部记录？')) return;
  clearHistoryAPI();
}

function setStatus(msg, type = '') {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar' + (type ? ' ' + type : '');
}

function hexStrToArrayBuffer(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
  return bytes.buffer;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
